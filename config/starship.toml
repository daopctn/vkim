"$schema" = 'https://starship.rs/config-schema.json'

format = """
[Óā∂](purple)\
$os\
$username\
[Óāī](bg:cyan fg:purple)\
$directory\
[Óāī](bg:pink fg:cyan)\
$git_branch\
$git_status\
[Óāī](fg:pink bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Óāī](fg:green bg:comment)\
$conda\
[Óāī](fg:comment bg:comment)\
$time\
[Óāī ](fg:comment)\
$cmd_duration\
$line_break\
$character"""

palette = 'manga-mono-light'

[os]
disabled = false
style = "bg:purple fg:crust"

[os.symbols]
Windows = "ÓúŹ"
Ubuntu = "ůįēą"
SUSE = "ÔĆĒ"
Raspbian = "ůįźŅ"
Mint = "ůį£≠"
Macos = "ůįÄĶ"
Manjaro = "ÔĆí"
Linux = "ůįĆĹ"
Gentoo = "ůį£®"
Fedora = "ůį£õ"
Alpine = "ÔĆÄ"
Amazon = "ÔČį"
Android = "Óúé"
Arch = "ůį£á"
Artix = "ůį£á"
CentOS = "ÔĆĄ"
Debian = "ůį£ö"
Redhat = "ůĪĄõ"
RedHatEnterprise = "ůĪĄõ"

[username]
show_always = true
style_user = "bg:purple fg:crust"
style_root = "bg:purple fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:cyan fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ůįĚö "
"Pictures" = "ÔÄĺ "
"Developer" = "ůį≤č "

[git_branch]
symbol = "Ôźė"
style = "bg:pink"
format = '[[ $symbol $branch ](fg:crust bg:pink)]($style)'

[git_status]
style = "bg:pink"
format = '[[($all_status$ahead_behind )](fg:crust bg:pink)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "Óėě "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "Óě®"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "Óėß"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "Óėą"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "ÓČĖ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "Óėī"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "Óėü"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "ÓėÜ"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "ÔĆą"
style = "bg:comment"
format = '[[ $symbol( $context) ](fg:crust bg:comment)]($style)'

[conda]
symbol = " ÔĄĆ "
style = "fg:crust bg:comment"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%_I:%M %p"
style = "bg:comment"
format = '[[ Ôźļ $time ](fg:crust bg:comment)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[‚ĚĮ](bold fg:blue)'
error_symbol = '[‚ĚĮ](bold fg:red)'
vimcmd_symbol = '[‚Ěģ](bold fg:green)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold fg:purple)'
vimcmd_replace_symbol = '[‚Ěģ](bold fg:purple)'
vimcmd_visual_symbol = '[‚Ěģ](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "Óęī in $duration "
style = "bg:purple"
disabled = false
show_notifications = true
min_time_to_notify = 500

